name: DB push

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: production
        options:
          - production

jobs:
  push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --workspace @repo/db run db:push:ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
