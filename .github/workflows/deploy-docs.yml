name: Deploy docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx --yes blodemd push
        env:
          BLODEMD_API_KEY: ${{ secrets.BLODEMD_API_KEY }}
